<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 320px; font-family: 'PingFang SC','Microsoft YaHei',sans-serif; font-size: 13px; color: #333; }
  .header { background: #4f46e5; color: #fff; padding: 12px 16px; font-size: 15px; font-weight: 600; }
  .content { padding: 12px 16px; }
  .info { font-size: 12px; color: #666; margin-bottom: 4px; }
  .title { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
  .score { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 12px; font-weight: 700; margin: 8px 0; }
  .score-high { background: #dcfce7; color: #16a34a; }
  .score-mid { background: #fef3c7; color: #d97706; }
  .score-low { background: #f3f4f6; color: #6b7280; }
  .btn { display: block; width: 100%; padding: 10px; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; margin-top: 10px; transition: opacity .2s; }
  .btn-primary { background: #4f46e5; color: #fff; }
  .btn-primary:hover { opacity: .9; }
  .btn:disabled { opacity: .5; cursor: default; }
  .skills { display: flex; flex-wrap: wrap; gap: 4px; margin: 4px 0; }
  .skill { background: #eef2ff; color: #4f46e5; padding: 2px 6px; border-radius: 4px; font-size: 11px; }
  .status { text-align: center; padding: 20px; color: #9ca3af; }
  .error { color: #ef4444; font-size: 12px; }
</style>
</head>
<body>
<div class="header">JobMatcher</div>
<div class="content" id="app">
  <div class="status" id="loading">检测页面中...</div>
</div>
<script src="popup.js"></script>
</body>
</html>
